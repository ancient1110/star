<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 日月食 真实物理光影动态推演</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; color: white; font-family: 'Microsoft YaHei', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-panel {
            position: absolute; top: 15px; left: 15px;
            background: rgba(20, 20, 30, 0.85); padding: 18px;
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            border: 1px solid #445; width: 320px; backdrop-filter: blur(8px);
        }

        h1 { font-size: 1.15rem; margin-top: 0; color: #4da8da; border-bottom: 1px solid #555; padding-bottom: 10px; }
        h2 { font-size: 0.95rem; color: #f2c94c; margin: 12px 0 6px 0; }
        
        button {
            background: #2a2a35; color: #fff; border: 1px solid #555;
            padding: 6px 0; margin: 3px 1%; border-radius: 4px;
            cursor: pointer; transition: all 0.2s; font-size: 0.85rem; width: 47%;
            display: inline-block;
        }
        button:hover { background: #4da8da; }
        button.active { background: #e74c3c; border-color: #e74c3c; font-weight: bold; }
        .btn-full { width: 97%; }

        #timeline-container { margin-top: 15px; padding-top: 15px; border-top: 1px solid #555; }
        #timeline { width: 100%; cursor: pointer; accent-color: #e74c3c; }
        .time-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aaa; margin-top: 2px; }
        
        #info-box {
            margin-top: 15px; font-size: 0.85rem; line-height: 1.5; color: #eee;
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 6px; border-left: 4px solid #4da8da;
        }

        #instructions {
            position: absolute; bottom: 15px; width: 100%; text-align: center;
            pointer-events: none; color: #aaa; font-size: 0.85rem; text-shadow: 1px 1px 2px #000;
        }

        #observer-panel {
            position: absolute; top: 15px; right: 15px;
            width: 320px; background: rgba(18, 18, 26, 0.86);
            border: 1px solid #445; border-radius: 10px;
            padding: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }
        #observer-panel h2 { margin-top: 0; }
        #observer-select {
            width: 100%; margin-bottom: 10px; padding: 6px 8px;
            color: #f5f7fa; background: #202330; border: 1px solid #566;
            border-radius: 6px;
        }
        #observer-view {
            width: 100%; aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 50% 50%, #081225 0%, #03060c 70%, #000 100%);
            border: 1px solid #556; border-radius: 8px;
        }
        #observer-meta {
            margin-top: 8px; font-size: 0.8rem; color: #d5dce6; line-height: 1.45;
            background: rgba(0,0,0,0.4); border-radius: 6px; padding: 8px 10px;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>日月食物理光影推演</h1>
        
        <h2>☀️ 日食 (新月时分)</h2>
        <button onclick="setEclipse('solar_total')" id="btn_solar_total">日全食</button>
        <button onclick="setEclipse('solar_annular')" id="btn_solar_annular">日环食</button>
        <button onclick="setEclipse('solar_partial')" id="btn_solar_partial" class="btn-full">日偏食</button>

        <h2>🌕 月食 (满月时分)</h2>
        <button onclick="setEclipse('lunar_total')" id="btn_lunar_total">月全食</button>
        <button onclick="setEclipse('lunar_partial')" id="btn_lunar_partial">月偏食</button>
        <button onclick="setEclipse('lunar_penumbral')" id="btn_lunar_penumbral" class="btn-full">半影月食</button>

        <div id="timeline-container">
            <div style="font-size:0.85rem; margin-bottom:5px; color:#f2c94c;">推演时间轴：</div>
            <input type="range" id="timeline" min="-1" max="1" step="0.005" value="-1">
            <div class="time-labels"><span>前</span><span>食甚</span><span>后</span></div>
            <label style="font-size:0.85rem; display:flex; align-items:center; margin-top:10px; cursor:pointer;">
                <input type="checkbox" id="autoplay" checked style="margin-right:5px;"> 自动播放
            </label>
        </div>

        <div id="info-box">请选择类型</div>
    </div>

    <div id="instructions">
        🖱️ 左键旋转 | 🖱️ 滚轮缩放 | 🖱️ 右键平移 | 注意观察星球表面的**真实物理光影**变化
    </div>

    <div id="observer-panel">
        <h2>📍 地球观测点 & 同步观测视窗</h2>
        <select id="observer-select"></select>
        <canvas id="observer-view" width="300" height="300"></canvas>
        <div id="observer-meta">等待初始化观测点…</div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ================= 1. 场景与引擎设置 =================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0x444455)); 

        const sunLight = new THREE.PointLight(0xffffff, 4, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.001;
        scene.add(sunLight);

        // ================= 2. 建立天体与轨道系统 =================
        const sun = new THREE.Mesh(
            new THREE.SphereGeometry(12, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffe877 })
        );
        scene.add(sun);
        sunLight.position.copy(sun.position);
        const glow = new THREE.Mesh(
            new THREE.SphereGeometry(15, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending })
        );
        sun.add(glow);

        const earthDist = 120;
        const earthRadius = 3;
        const earthGroup = new THREE.Group(); 
        scene.add(earthGroup);

        const earthOrbitLine = new THREE.LineLoop(
            new THREE.BufferGeometry().setFromPoints(new THREE.Path().absarc(0,0,earthDist,0,Math.PI*2).getPoints(128)),
            new THREE.LineBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.5 })
        );
        earthOrbitLine.rotation.x = Math.PI / 2;
        scene.add(earthOrbitLine);

        const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x3399ff, specular: 0x222222, shininess: 15 });
        const eclipseUniforms = {
            sunWorldPos: { value: new THREE.Vector3() },
            moonWorldPos: { value: new THREE.Vector3() },
            sunRadius: { value: 12.0 },
            moonRadius: { value: 0.8 },
            eclipseStrength: { value: 1.0 }
        };

        earthMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.sunWorldPos = eclipseUniforms.sunWorldPos;
            shader.uniforms.moonWorldPos = eclipseUniforms.moonWorldPos;
            shader.uniforms.sunRadius = eclipseUniforms.sunRadius;
            shader.uniforms.moonRadius = eclipseUniforms.moonRadius;
            shader.uniforms.eclipseStrength = eclipseUniforms.eclipseStrength;

            const hasVertexHooks = shader.vertexShader.includes('#include <common>') && shader.vertexShader.includes('#include <worldpos_vertex>');
            const hasFragmentHooks = shader.fragmentShader.includes('#include <common>') && shader.fragmentShader.includes('#include <dithering_fragment>');

            // 避免合并冲突或 three 版本差异导致注入失败后整页“无反应”
            if (!hasVertexHooks || !hasFragmentHooks) {
                console.warn('Eclipse shader patch skipped: expected shader hooks not found.');
                return;
            }

            shader.vertexShader = shader.vertexShader.replace(
                '#include <common>',
                `#include <common>
 varying vec3 vWorldPos;`
            ).replace(
                '#include <worldpos_vertex>',
                `#include <worldpos_vertex>
 vWorldPos = worldPosition.xyz;`
            );

            shader.fragmentShader = shader.fragmentShader.replace(
                '#include <common>',
                `#include <common>
 varying vec3 vWorldPos;
 uniform vec3 sunWorldPos;
 uniform vec3 moonWorldPos;
 uniform float sunRadius;
 uniform float moonRadius;
 uniform float eclipseStrength;

 float diskOverlapRatio(float rs, float rm, float d) {
     float pi = 3.141592653589793;
     if (d >= rs + rm) return 0.0;
     if (d <= abs(rs - rm)) {
         float minR = min(rs, rm);
         return (minR * minR) / (rs * rs);
     }

     float rs2 = rs * rs;
     float rm2 = rm * rm;
     float alpha = acos(clamp((d * d + rs2 - rm2) / (2.0 * d * rs), -1.0, 1.0));
     float beta = acos(clamp((d * d + rm2 - rs2) / (2.0 * d * rm), -1.0, 1.0));
     float area = rs2 * alpha + rm2 * beta - 0.5 * sqrt(max(0.0, (-d + rs + rm) * (d + rs - rm) * (d - rs + rm) * (d + rs + rm)));
     return clamp(area / (pi * rs2), 0.0, 1.0);
 }`
            ).replace(
                '#include <dithering_fragment>',
                `float eclipse = 0.0;
 vec3 toSun = sunWorldPos - vWorldPos;
 vec3 toMoon = moonWorldPos - vWorldPos;
 float distSun = length(toSun);
 float distMoon = length(toMoon);

 if (eclipseStrength > 0.0 && distSun > sunRadius && distMoon > moonRadius) {
     vec3 sunDir = normalize(toSun);
     vec3 moonDir = normalize(toMoon);
     float sep = acos(clamp(dot(sunDir, moonDir), -1.0, 1.0));
     float sunAng = asin(clamp(sunRadius / distSun, 0.0, 1.0));
     float moonAng = asin(clamp(moonRadius / distMoon, 0.0, 1.0));
     float rawOcc = diskOverlapRatio(max(sunAng, 1e-5), moonAng, sep);
     eclipse = pow(rawOcc, 0.65) * eclipseStrength;
 }

 outgoingLight *= (1.0 - 0.95 * clamp(eclipse, 0.0, 1.0));
 #include <dithering_fragment>`
            );
        };

        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(earthRadius, 64, 64),
            earthMaterial
        );
        earth.castShadow = true;
        earth.receiveShadow = true;
        earthGroup.add(earth);

        const moonRadius = 0.8;
        eclipseUniforms.moonRadius.value = moonRadius;
        const moonOrbitTiltGroup = new THREE.Group(); 
        earthGroup.add(moonOrbitTiltGroup);
        const moonGroup = new THREE.Group(); 
        moonOrbitTiltGroup.add(moonGroup);

        let moonOrbitLine;
        function updateMoonOrbit(radius) {
            if(moonOrbitLine) moonOrbitTiltGroup.remove(moonOrbitLine);
            moonOrbitLine = new THREE.LineLoop(
                new THREE.BufferGeometry().setFromPoints(new THREE.Path().absarc(0,0,radius,0,Math.PI*2).getPoints(64)),
                new THREE.LineBasicMaterial({ color: 0x888888 })
            );
            moonOrbitLine.rotation.x = Math.PI / 2;
            moonOrbitTiltGroup.add(moonOrbitLine);
        }

        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(moonRadius, 32, 32),
            new THREE.MeshPhongMaterial({ color: 0xced4df, specular: 0x7f8fa8, shininess: 26 })
        );
        moon.castShadow = false;
        moon.receiveShadow = true;
        moonGroup.add(moon);
        const moonBounceLight = new THREE.PointLight(0xbfd1ff, 0, 45, 2);
        moonBounceLight.castShadow = false;
        scene.add(moonBounceLight);

        // ================= 3. 透明几何阴影锥 (修改：直接加入宇宙世界，不再嵌套) =================
        function createShadowCone(baseRadius, endRadius, length, isUmbra) {
            const geo = new THREE.CylinderGeometry(endRadius, baseRadius, length, 64, 1, true);
            geo.rotateX(Math.PI / 2); 
            geo.translate(0, 0, length / 2); 
            
            const mat = new THREE.MeshBasicMaterial({
                color: isUmbra ? 0x000000 : 0xaaaaaa,
                transparent: true,
                opacity: isUmbra ? 0.6 : 0.15,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            return new THREE.Mesh(geo, mat);
        }

        const moonUmbraLength = 13.5;
        const moonUmbra = createShadowCone(moonRadius, 0.01, moonUmbraLength, true); 
        const moonPenumbra = createShadowCone(moonRadius, 3.5, 20, false);
        // 【关键修复1】不再 add 进月球编组，而是直接添加进全局的 scene 中
        scene.add(moonUmbra);
        scene.add(moonPenumbra);

        const earthUmbra = createShadowCone(earthRadius, 0.01, 40, true); 
        const earthPenumbra = createShadowCone(earthRadius, 9, 45, false);
        // 【关键修复1】同上
        scene.add(earthUmbra);
        scene.add(earthPenumbra);

        const _tmpSunToCaster = new THREE.Vector3();
        const _tmpWorldDir = new THREE.Vector3();
        const _tmpQuaternion = new THREE.Quaternion();
        const _zAxis = new THREE.Vector3(0, 0, 1);
        const _tmpMoonToSun = new THREE.Vector3();
        const _tmpMoonToEarth = new THREE.Vector3();
        const _tmpObserverWorld = new THREE.Vector3();
        const _tmpObserverToSun = new THREE.Vector3();
        const _tmpObserverToMoon = new THREE.Vector3();
        const _tmpObserverToEarth = new THREE.Vector3();

        function diskOverlapRatio(rs, rm, d) {
            if (d >= rs + rm) return 0;
            if (d <= Math.abs(rs - rm)) {
                const minR = Math.min(rs, rm);
                return (minR * minR) / (rs * rs);
            }

            const rs2 = rs * rs;
            const rm2 = rm * rm;
            const alpha = Math.acos(THREE.MathUtils.clamp((d * d + rs2 - rm2) / (2 * d * rs), -1, 1));
            const beta = Math.acos(THREE.MathUtils.clamp((d * d + rm2 - rs2) / (2 * d * rm), -1, 1));
            const area = rs2 * alpha + rm2 * beta - 0.5 * Math.sqrt(Math.max(0, (-d + rs + rm) * (d + rs - rm) * (d - rs + rm) * (d + rs + rm)));
            return THREE.MathUtils.clamp(area / (Math.PI * rs2), 0, 1);
        }

        function syncShadowCone(cone, casterWorldPos, casterRadius) {
            _tmpSunToCaster.subVectors(casterWorldPos, sunLight.position);
            if (_tmpSunToCaster.lengthSq() < 1e-8) return;

            _tmpWorldDir.copy(_tmpSunToCaster).normalize();
            _tmpQuaternion.setFromUnitVectors(_zAxis, _tmpWorldDir);
            cone.quaternion.copy(_tmpQuaternion);

            // 锥体从表面发出，而非从天体中心发出，避免“影锥落点超前”
            cone.position.copy(casterWorldPos).addScaledVector(_tmpWorldDir, casterRadius);
        }

        // ================= 4. 天文数据与逻辑 =================
        const eclipseData = {
            'solar_total': {
                title: "日全食 (本影触及地球)",
                desc: "月球在日地之间且距离地球较近。几何本影锥精准对齐了引擎生成的物理黑影投射。您会看到它们完美重合在一起扫过地表。",
                baseAngle: Math.PI, radius: 11, tiltZ: 0, showMoonShadows: true
            },
            'solar_annular': {
                title: "日环食 (本影过短)",
                desc: "月球距离地球较远，本影锥尖端悬空。地表遮光改为数学圆盘重叠模型：中心区保持较深暗化，外围半影平滑过渡，不再出现发散放大的淡虚影。",
                baseAngle: Math.PI, radius: 16, tiltZ: 0, showMoonShadows: true
            },
            'solar_partial': {
                title: "日偏食 (轨道倾斜)",
                desc: "轨道存在倾角。本影锥偏离了地球中心，黑影仅擦过地球边缘。",
                baseAngle: Math.PI, radius: 12.5, tiltZ: 0.28, showMoonShadows: true
            },
            'lunar_total': {
                title: "月全食 (月亮切入黑影)",
                desc: "地球在日月之间。月球完全钻入了收束的几何本影锥内部，同时也被物理阴影彻底屏蔽了光线。",
                baseAngle: 0, radius: 13, tiltZ: 0, showMoonShadows: false
            },
            'lunar_partial': {
                title: "月偏食 (擦肩而过)",
                desc: "轨道倾斜，月球只有下半部分切入了本影锥。您可以观察真实的明暗分界线。",
                baseAngle: 0, radius: 13, tiltZ: 0.15, showMoonShadows: false
            },
            'lunar_penumbral': {
                title: "半影月食 (微弱黯淡)",
                desc: "月球彻底错过了深色的本影区，仅仅从浅色的半影锥中穿过。",
                baseAngle: 0, radius: 13, tiltZ: 0.3, showMoonShadows: false
            }
        };

        let currentConfig = null;
        let timelineEl = document.getElementById('timeline');
        let autoplayEl = document.getElementById('autoplay');
        const observerSelectEl = document.getElementById('observer-select');
        const observerMetaEl = document.getElementById('observer-meta');
        const observerCanvas = document.getElementById('observer-view');
        const observerCtx = observerCanvas.getContext('2d');

        const observerCandidates = [
            { id: 'best', name: '🌟 食甚最佳观测点（固定观测）', autoBest: true },
            { id: 'equator_africa', name: '几内亚湾附近（赤道，0°N 0°E）', lat: 0, lon: 0 },
            { id: 'east_asia', name: '华东附近（31°N 121°E）', lat: 31, lon: 121 },
            { id: 'north_america', name: '北美中部（36°N 97°W）', lat: 36, lon: -97 },
            { id: 'south_america', name: '南美西岸（12°S 77°W）', lat: -12, lon: -77 }
        ];

        let currentObserver = { lat: 0, lon: 0, label: '' };
        const observerMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.11, 12, 12),
            new THREE.MeshBasicMaterial({ color: 0xff5757 })
        );
        earthGroup.add(observerMarker);

        function latLonToLocal(latDeg, lonDeg, radius) {
            const lat = THREE.MathUtils.degToRad(latDeg);
            const lon = THREE.MathUtils.degToRad(lonDeg);
            const x = radius * Math.cos(lat) * Math.cos(lon);
            const y = radius * Math.sin(lat);
            const z = radius * Math.cos(lat) * Math.sin(lon);
            return new THREE.Vector3(x, y, z);
        }

        function angularRadius(radius, dist) {
            if (dist <= radius) return Math.PI / 2;
            return Math.asin(THREE.MathUtils.clamp(radius / dist, 0, 1));
        }

        function estimateOccultationForObserver(lat, lon, type) {
            const earthPos = earthGroup.position.clone();
            const observerLocal = latLonToLocal(lat, lon, earthRadius + 0.03);
            const observerWorld = earthPos.clone().add(observerLocal);
            const moonWorld = new THREE.Vector3();
            moonGroup.getWorldPosition(moonWorld);

            _tmpObserverToSun.subVectors(sunLight.position, observerWorld);
            _tmpObserverToMoon.subVectors(moonWorld, observerWorld);
            _tmpObserverToEarth.subVectors(earthPos, observerWorld);
            const sunDist = _tmpObserverToSun.length();
            const moonDist = _tmpObserverToMoon.length();
            const earthDistToObs = _tmpObserverToEarth.length();

            if (type.startsWith('solar')) {
                const sep = _tmpObserverToSun.clone().normalize().angleTo(_tmpObserverToMoon.clone().normalize());
                const sunAng = angularRadius(eclipseUniforms.sunRadius.value, sunDist);
                const moonAng = angularRadius(moonRadius, moonDist);
                return diskOverlapRatio(Math.max(sunAng, 1e-5), moonAng, sep);
            }

            const sep = _tmpObserverToMoon.clone().normalize().angleTo(_tmpObserverToEarth.clone().normalize());
            const moonAng = angularRadius(moonRadius, moonDist);
            const earthAng = angularRadius(earthRadius, earthDistToObs);
            return diskOverlapRatio(Math.max(moonAng, 1e-5), earthAng, sep);
        }

        function solveBestObserverAtMaximum(type) {
            if (!currentConfig) return { lat: 0, lon: 0 };
            const oldT = parseFloat(timelineEl.value);
            updatePositions(0);
            let best = { lat: 0, lon: 0, score: -1 };
            for (let lat = -70; lat <= 70; lat += 5) {
                for (let lon = -180; lon < 180; lon += 5) {
                    const score = estimateOccultationForObserver(lat, lon, type);
                    if (score > best.score) best = { lat, lon, score };
                }
            }
            updatePositions(oldT);
            return best;
        }

        function refreshObserverMarker() {
            const local = latLonToLocal(currentObserver.lat, currentObserver.lon, earthRadius + 0.13);
            observerMarker.position.copy(local);
        }

        function drawObserverView(type) {
            const w = observerCanvas.width;
            const h = observerCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            observerCtx.clearRect(0, 0, w, h);

            observerCtx.fillStyle = '#02050c';
            observerCtx.fillRect(0, 0, w, h);

            const observerLocal = latLonToLocal(currentObserver.lat, currentObserver.lon, earthRadius + 0.03);
            earthGroup.getWorldPosition(_tmpObserverWorld);
            _tmpObserverWorld.add(observerLocal);

            const moonWorld = new THREE.Vector3();
            moonGroup.getWorldPosition(moonWorld);
            _tmpObserverToSun.subVectors(sunLight.position, _tmpObserverWorld);
            _tmpObserverToMoon.subVectors(moonWorld, _tmpObserverWorld);
            _tmpObserverToEarth.subVectors(earthGroup.position, _tmpObserverWorld);

            const sunDist = _tmpObserverToSun.length();
            const moonDist = _tmpObserverToMoon.length();
            const earthDistToObs = _tmpObserverToEarth.length();
            const sepSunMoon = _tmpObserverToSun.clone().normalize().angleTo(_tmpObserverToMoon.clone().normalize());
            const sepMoonEarth = _tmpObserverToMoon.clone().normalize().angleTo(_tmpObserverToEarth.clone().normalize());

            const sunAng = angularRadius(eclipseUniforms.sunRadius.value, sunDist);
            const moonAng = angularRadius(moonRadius, moonDist);
            const earthAng = angularRadius(earthRadius, earthDistToObs);

            const baseR = 58;
            const sunR = THREE.MathUtils.clamp(baseR * (sunAng / 0.1), 14, 52);
            const moonR = THREE.MathUtils.clamp(baseR * (moonAng / 0.1), 12, 50);
            const earthR = THREE.MathUtils.clamp(baseR * (earthAng / 0.1), 20, 120);
            const earthWorld = earthGroup.position.clone();
            const observerUp = _tmpObserverWorld.clone().sub(earthWorld).normalize();
            const worldNorth = new THREE.Vector3(0, 1, 0);
            const worldAltNorth = new THREE.Vector3(0, 0, 1);
            let east = new THREE.Vector3().crossVectors(worldNorth, observerUp);
            if (east.lengthSq() < 1e-6) east = new THREE.Vector3().crossVectors(worldAltNorth, observerUp);
            east.normalize();
            const north = new THREE.Vector3().crossVectors(observerUp, east).normalize();
            const sunDir = _tmpObserverToSun.clone().normalize();
            const moonDir = _tmpObserverToMoon.clone().normalize();
            const earthDir = _tmpObserverToEarth.clone().normalize();
            const sunAlt = Math.asin(THREE.MathUtils.clamp(sunDir.dot(observerUp), -1, 1));
            const moonAlt = Math.asin(THREE.MathUtils.clamp(moonDir.dot(observerUp), -1, 1));
            function getOffset(primaryDir, targetDir, scale = 185) {
                const right = new THREE.Vector3().crossVectors(primaryDir, north).normalize();
                const up = new THREE.Vector3().crossVectors(right, primaryDir).normalize();
                const x = Math.atan2(targetDir.dot(right), targetDir.dot(primaryDir));
                const y = Math.atan2(targetDir.dot(up), targetDir.dot(primaryDir));
                return { x: x * scale, y: -y * scale };
            }

            const solarOcc = diskOverlapRatio(Math.max(sunAng, 1e-5), moonAng, sepSunMoon);
            const lunarOcc = diskOverlapRatio(Math.max(moonAng, 1e-5), earthAng, sepMoonEarth);
            const isSolarMode = type.startsWith('solar');
            if (isSolarMode) {
                if (sunAlt <= 0) {
                    observerCtx.fillStyle = '#7f8ea3';
                    observerCtx.font = '16px Microsoft YaHei';
                    observerCtx.textAlign = 'center';
                    observerCtx.fillText('该地点当前看不到太阳', cx, cy);
                    observerMetaEl.innerHTML = `观测点：<strong>${currentObserver.label}</strong><br>纬度 ${currentObserver.lat.toFixed(1)}°，经度 ${currentObserver.lon.toFixed(1)}°<br>太阳高度：<strong>${THREE.MathUtils.radToDeg(sunAlt).toFixed(1)}°</strong><br>日食遮挡率：<strong>0.0%</strong>`;
                    return;
                }
                observerCtx.beginPath();
                observerCtx.fillStyle = '#ffd867';
                observerCtx.arc(cx, cy, sunR, 0, Math.PI * 2);
                observerCtx.fill();

                if (moonAlt > 0) {
                    const offset = getOffset(sunDir, moonDir);
                    observerCtx.beginPath();
                    observerCtx.fillStyle = '#d8dce5';
                    observerCtx.arc(cx + offset.x, cy + offset.y, moonR, 0, Math.PI * 2);
                    observerCtx.fill();
                }

                observerMetaEl.innerHTML = `观测点：<strong>${currentObserver.label}</strong><br>纬度 ${currentObserver.lat.toFixed(1)}°，经度 ${currentObserver.lon.toFixed(1)}°<br>太阳高度：<strong>${THREE.MathUtils.radToDeg(sunAlt).toFixed(1)}°</strong>｜月亮高度：<strong>${THREE.MathUtils.radToDeg(moonAlt).toFixed(1)}°</strong><br>日食遮挡率：<strong>${(solarOcc * 100).toFixed(1)}%</strong>`;
                return;
            }

            if (moonAlt <= 0) {
                observerCtx.fillStyle = '#7f8ea3';
                observerCtx.font = '16px Microsoft YaHei';
                observerCtx.textAlign = 'center';
                observerCtx.fillText('该地点当前看不到月亮', cx, cy);
                observerMetaEl.innerHTML = `观测点：<strong>${currentObserver.label}</strong><br>纬度 ${currentObserver.lat.toFixed(1)}°，经度 ${currentObserver.lon.toFixed(1)}°<br>月亮高度：<strong>${THREE.MathUtils.radToDeg(moonAlt).toFixed(1)}°</strong><br>月食入影率：<strong>0.0%</strong>`;
                return;
            }

            observerCtx.beginPath();
            observerCtx.fillStyle = '#d8dce5';
            observerCtx.arc(cx, cy, moonR, 0, Math.PI * 2);
            observerCtx.fill();
            const lunarOffset = getOffset(moonDir, earthDir, 155);
            observerCtx.beginPath();
            observerCtx.fillStyle = 'rgba(10, 10, 18, 0.72)';
            observerCtx.arc(cx + lunarOffset.x, cy + lunarOffset.y, earthR, 0, Math.PI * 2);
            observerCtx.fill();

            observerMetaEl.innerHTML = `观测点：<strong>${currentObserver.label}</strong><br>纬度 ${currentObserver.lat.toFixed(1)}°，经度 ${currentObserver.lon.toFixed(1)}°<br>太阳高度：<strong>${THREE.MathUtils.radToDeg(sunAlt).toFixed(1)}°</strong>｜月亮高度：<strong>${THREE.MathUtils.radToDeg(moonAlt).toFixed(1)}°</strong><br>月食入影率：<strong>${(lunarOcc * 100).toFixed(1)}%</strong>`;
        }

        function setupObserverOptions() {
            observerSelectEl.innerHTML = observerCandidates
                .map((pt) => `<option value="${pt.id}">${pt.name}</option>`)
                .join('');
            observerSelectEl.addEventListener('change', () => {
                const selected = observerCandidates.find((pt) => pt.id === observerSelectEl.value);
                if (!selected) return;
                if (selected.autoBest) {
                    const best = solveBestObserverAtMaximum(currentObserver.type || 'solar_total');
                    currentObserver.lat = best.lat;
                    currentObserver.lon = best.lon;
                    currentObserver.label = '🌟 食甚最佳观测点（固定）';
                } else {
                    currentObserver.lat = selected.lat;
                    currentObserver.lon = selected.lon;
                    currentObserver.label = selected.name;
                }
                refreshObserverMarker();
            });
            observerSelectEl.value = 'best';
        }

        window.setEclipse = function(type) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn_' + type).classList.add('active');

            currentConfig = eclipseData[type];
            document.getElementById('info-box').innerHTML = `<strong>${currentConfig.title}</strong><br><br>${currentConfig.desc}`;
            
            moonUmbra.visible = currentConfig.showMoonShadows;
            moonPenumbra.visible = currentConfig.showMoonShadows;
            earthUmbra.visible = !currentConfig.showMoonShadows;
            earthPenumbra.visible = !currentConfig.showMoonShadows;

            // 日食阶段用纯数学遮挡模型替代引擎的发散投影，避免“淡虚影放大”
            eclipseUniforms.eclipseStrength.value = currentConfig.showMoonShadows ? 1.0 : 0.0;

            updateMoonOrbit(currentConfig.radius);
            moonOrbitTiltGroup.rotation.z = currentConfig.tiltZ;
            timelineEl.value = -1;
            
            if(type.startsWith('solar')) {
                camera.position.set(earthDist + 20, 10, 20);
                controls.target.copy(earthGroup.position);
            } else {
                camera.position.set(earthDist + 22, 5, 20);
            }

            currentObserver.type = type;
            const best = solveBestObserverAtMaximum(type);
            currentObserver.lat = best.lat;
            currentObserver.lon = best.lon;
            currentObserver.label = '🌟 食甚最佳观测点（固定）';
            refreshObserverMarker();
        };

        // ================= 5. 位置推演与阴影追踪 =================
        function updatePositions(t) {
            if(!currentConfig) return;

            const earthAngle = t * 0.03; 
            earthGroup.position.set(
                Math.cos(earthAngle) * earthDist,
                0,
                Math.sin(earthAngle) * earthDist
            );

            const moonAngle = currentConfig.baseAngle + (t * 0.35);
            moonGroup.position.set(
                Math.cos(moonAngle) * currentConfig.radius,
                0,
                Math.sin(moonAngle) * currentConfig.radius
            );

            earth.rotation.y = t * 8; 
            moon.rotation.y = moonAngle; 

            // 【关键修复2】获取绝对世界坐标
            const earthWorldPos = new THREE.Vector3();
            earthGroup.getWorldPosition(earthWorldPos);
            
            const moonWorldPos = new THREE.Vector3();
            moonGroup.getWorldPosition(moonWorldPos);

            eclipseUniforms.sunWorldPos.value.copy(sunLight.position);
            eclipseUniforms.moonWorldPos.value.copy(moonWorldPos);

            // 让影锥严格沿“太阳 -> 天体 -> 阴影”方向，并从天体背日侧表面出发
            syncShadowCone(earthUmbra, earthWorldPos, earthRadius);
            syncShadowCone(earthPenumbra, earthWorldPos, earthRadius);
            syncShadowCone(moonUmbra, moonWorldPos, moonRadius);
            syncShadowCone(moonPenumbra, moonWorldPos, moonRadius);

            // 月面反光：按“月球受日照 × 面向地球程度 × 是否被地球本影遮挡”估算，回照到地球
            _tmpMoonToSun.subVectors(sunLight.position, moonWorldPos);
            _tmpMoonToEarth.subVectors(earthWorldPos, moonWorldPos);
            const moonToSunDist = _tmpMoonToSun.length();
            const moonToEarthDist = _tmpMoonToEarth.length();

            let lunarShadowFactor = 1;
            if (moonToSunDist > eclipseUniforms.sunRadius.value && moonToEarthDist > earthRadius) {
                const sep = _tmpMoonToSun.clone().normalize().angleTo(_tmpMoonToEarth.clone().normalize());
                const sunAng = Math.asin(THREE.MathUtils.clamp(eclipseUniforms.sunRadius.value / moonToSunDist, 0, 1));
                const earthAng = Math.asin(THREE.MathUtils.clamp(earthRadius / moonToEarthDist, 0, 1));
                const occ = diskOverlapRatio(Math.max(sunAng, 1e-5), earthAng, sep);
                lunarShadowFactor = 1 - occ;
            }

            const phaseFactor = Math.max(_tmpMoonToSun.normalize().dot(_tmpMoonToEarth.normalize()), 0);
            moonBounceLight.position.copy(moonWorldPos);
            moonBounceLight.intensity = 0.55 * phaseFactor * lunarShadowFactor;

            if(!currentConfig.showMoonShadows) {
                controls.target.copy(moonWorldPos);
            } else {
                controls.target.copy(earthWorldPos);
            }
        }

        // ================= 6. 渲染循环 =================
        timelineEl.addEventListener('input', () => { autoplayEl.checked = false; });

        function animate() {
            requestAnimationFrame(animate);

            let t = parseFloat(timelineEl.value);
            if (autoplayEl.checked) {
                t += 0.003;
                if (t > 1) t = -1; 
                timelineEl.value = t;
            }

            updatePositions(t);
            if (currentConfig) drawObserverView(currentObserver.type || 'solar_total');
            controls.update();
            renderer.render(scene, camera);
        }

        setupObserverOptions();
        setEclipse('solar_total');
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
